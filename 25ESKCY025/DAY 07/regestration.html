<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form action="registration.php" method="POST" enctype="multipart/form-data" class="form">

        <label>Upload Image:</label><br>
        <input type="file" name="myfile" required><br><br>

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Branch:</label><br>
        <input type="text" name="branch" required><br><br>

        <label>CGPA:</label><br>
        <input type="number" name="cgpa" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone_no" required><br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
